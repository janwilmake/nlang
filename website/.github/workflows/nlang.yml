# Generated by nlang - Executable Extensions
# https://github.com/nicely-defined/nlang
#
# This workflow builds double-extension files:
# - .xyz.md files are sent to an LLM API
# - .xyz.js/.ts files are executed in Node.js
# Output is written to the dist/ directory.

name: nlang build

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'dist/**'
      - '.nlang-cache/**'

  workflow_dispatch:
    inputs:
      file:
        description: 'Specific file to build (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install nlang
        run: npm install -g nlang-cli


      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .nlang-cache
          key: nlang-cache-${{ github.sha }}
          restore-keys: |
            nlang-cache-

      - name: Build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.file }}" ]; then
            nlang build --file "${{ github.event.inputs.file }}"
          else
            nlang build
          fi

      - name: Commit and push output
        run: |
          git config user.name "nlang[bot]"
          git config user.email "nlang[bot]@users.noreply.github.com"
          git add dist/ .nlang-cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "nlang: build output [skip ci]"
            git push
          fi
